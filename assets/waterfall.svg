<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" width="100%" height="80">
  <defs>
    <linearGradient id="dropGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#999" stop-opacity="0"/>
      <stop offset="40%" stop-color="#888" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#888" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#999" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dropLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bbb" stop-opacity="0"/>
      <stop offset="40%" stop-color="#aaa" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#aaa" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#bbb" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dropDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#666" stop-opacity="0"/>
      <stop offset="40%" stop-color="#555" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#555" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#666" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Dark drops -->
  <rect x="60" y="-30" width="1.2" height="30" fill="url(#dropDark)">
    <animate attributeName="y" from="-30" to="80" dur="1.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="180" y="-30" width="1.2" height="30" fill="url(#dropDark)">
    <animate attributeName="y" from="-30" to="80" dur="2.1s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  <rect x="340" y="-30" width="1.2" height="30" fill="url(#dropDark)">
    <animate attributeName="y" from="-30" to="80" dur="1.6s" begin="0.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="520" y="-30" width="1.2" height="30" fill="url(#dropDark)">
    <animate attributeName="y" from="-30" to="80" dur="2.0s" begin="0.1s" repeatCount="indefinite"/>
  </rect>
  <rect x="700" y="-30" width="1.2" height="30" fill="url(#dropDark)">
    <animate attributeName="y" from="-30" to="80" dur="1.7s" begin="0.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="860" y="-30" width="1.2" height="30" fill="url(#dropDark)">
    <animate attributeName="y" from="-30" to="80" dur="2.2s" begin="0.9s" repeatCount="indefinite"/>
  </rect>
  <rect x="1020" y="-30" width="1.2" height="30" fill="url(#dropDark)">
    <animate attributeName="y" from="-30" to="80" dur="1.9s" begin="0.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="1140" y="-30" width="1.2" height="30" fill="url(#dropDark)">
    <animate attributeName="y" from="-30" to="80" dur="1.5s" begin="0.7s" repeatCount="indefinite"/>
  </rect>

  <!-- Medium drops -->
  <rect x="120" y="-25" width="1" height="25" fill="url(#dropGrad)">
    <animate attributeName="y" from="-25" to="80" dur="2.3s" begin="0.4s" repeatCount="indefinite"/>
  </rect>
  <rect x="260" y="-25" width="1" height="25" fill="url(#dropGrad)">
    <animate attributeName="y" from="-25" to="80" dur="1.9s" begin="1.1s" repeatCount="indefinite"/>
  </rect>
  <rect x="420" y="-25" width="1" height="25" fill="url(#dropGrad)">
    <animate attributeName="y" from="-25" to="80" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
  </rect>
  <rect x="580" y="-25" width="1" height="25" fill="url(#dropGrad)">
    <animate attributeName="y" from="-25" to="80" dur="2.0s" begin="0.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="740" y="-25" width="1" height="25" fill="url(#dropGrad)">
    <animate attributeName="y" from="-25" to="80" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="900" y="-25" width="1" height="25" fill="url(#dropGrad)">
    <animate attributeName="y" from="-25" to="80" dur="1.7s" begin="1.3s" repeatCount="indefinite"/>
  </rect>
  <rect x="1080" y="-25" width="1" height="25" fill="url(#dropGrad)">
    <animate attributeName="y" from="-25" to="80" dur="2.1s" begin="0.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Light drops -->
  <rect x="30" y="-20" width="0.8" height="20" fill="url(#dropLight)">
    <animate attributeName="y" from="-20" to="80" dur="2.8s" begin="0.7s" repeatCount="indefinite"/>
  </rect>
  <rect x="150" y="-20" width="0.8" height="20" fill="url(#dropLight)">
    <animate attributeName="y" from="-20" to="80" dur="3.0s" begin="1.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="300" y="-20" width="0.8" height="20" fill="url(#dropLight)">
    <animate attributeName="y" from="-20" to="80" dur="2.6s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  <rect x="470" y="-20" width="0.8" height="20" fill="url(#dropLight)">
    <animate attributeName="y" from="-20" to="80" dur="2.9s" begin="1.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="630" y="-20" width="0.8" height="20" fill="url(#dropLight)">
    <animate attributeName="y" from="-20" to="80" dur="2.7s" begin="0.9s" repeatCount="indefinite"/>
  </rect>
  <rect x="790" y="-20" width="0.8" height="20" fill="url(#dropLight)">
    <animate attributeName="y" from="-20" to="80" dur="3.1s" begin="0.4s" repeatCount="indefinite"/>
  </rect>
  <rect x="950" y="-20" width="0.8" height="20" fill="url(#dropLight)">
    <animate attributeName="y" from="-20" to="80" dur="2.5s" begin="1.0s" repeatCount="indefinite"/>
  </rect>
  <rect x="1100" y="-20" width="0.8" height="20" fill="url(#dropLight)">
    <animate attributeName="y" from="-20" to="80" dur="2.8s" begin="0.6s" repeatCount="indefinite"/>
  </rect>
  <rect x="1170" y="-20" width="0.8" height="20" fill="url(#dropLight)">
    <animate attributeName="y" from="-20" to="80" dur="3.2s" begin="1.4s" repeatCount="indefinite"/>
  </rect>

  <!-- Extra fine mist -->
  <rect x="90" y="-15" width="0.5" height="15" fill="url(#dropLight)">
    <animate attributeName="y" from="-15" to="80" dur="3.5s" begin="0.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="210" y="-15" width="0.5" height="15" fill="url(#dropLight)">
    <animate attributeName="y" from="-15" to="80" dur="3.3s" begin="1.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="380" y="-15" width="0.5" height="15" fill="url(#dropLight)">
    <animate attributeName="y" from="-15" to="80" dur="3.6s" begin="0.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="550" y="-15" width="0.5" height="15" fill="url(#dropLight)">
    <animate attributeName="y" from="-15" to="80" dur="3.1s" begin="1.1s" repeatCount="indefinite"/>
  </rect>
  <rect x="670" y="-15" width="0.5" height="15" fill="url(#dropLight)">
    <animate attributeName="y" from="-15" to="80" dur="3.4s" begin="0.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="830" y="-15" width="0.5" height="15" fill="url(#dropLight)">
    <animate attributeName="y" from="-15" to="80" dur="3.7s" begin="1.6s" repeatCount="indefinite"/>
  </rect>
  <rect x="980" y="-15" width="0.5" height="15" fill="url(#dropLight)">
    <animate attributeName="y" from="-15" to="80" dur="3.0s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  <rect x="1050" y="-15" width="0.5" height="15" fill="url(#dropLight)">
    <animate attributeName="y" from="-15" to="80" dur="3.8s" begin="1.9s" repeatCount="indefinite"/>
  </rect>
</svg>
